name: tajweed_corrector
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  firebase_analytics: ^12.2.0
  google_sign_in: ^6.2.0
  image_picker: ^1.0.0
  audioplayers: ^6.6.0
  just_audio: ^0.10.5
  google_fonts: ^8.0.2
  fl_chart: ^1.2.0
  record: ^6.2.0
  path_provider: ^2.1.5
  shared_preferences: ^2.2.0
  provider: ^6.0.0
  http: ^1.2.0
  dio: ^5.4.0
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  image_path: assets/logo_1.png
  adaptive_icon_foreground: assets/logo_1.png
  adaptive_icon_background: "#0A3E8E"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/Avatars/
    - assets/audio/arabic_alphabet_flat/
    - assets/audio/arabic_alphabet/
